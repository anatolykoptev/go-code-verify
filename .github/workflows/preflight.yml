name: preflight

# Pre-merge build/test gate. Runs on GitHub-hosted `ubuntu-24.04-arm` — free
# unlimited minutes for public repos, and arm64 matches the ARM prod box.
# Moved off the self-hosted krolik runner 2026-07-14. The old dedicated
# runner (krolik-go-code-verify) was registered but had no systemd unit, so
# every PR run queued forever against an offline runner — this migration
# also simply un-breaks CI here. GitHub-hosted runners sandbox fork PRs in
# throwaway VMs, so the old same-repo guard is gone with the runner.
#
# No ephemeral-postgres step — this service has no database. `make preflight`
# is gofmt + vet + build + test + govulncheck only (govulncheck self-installs
# via the Makefile).

on:
  pull_request:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    # A hung job must never linger for GitHub's 6h default.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: make preflight
        run: make preflight
